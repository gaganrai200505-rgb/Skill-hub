services:
  - type: web
    name: skill-hub
    runtime: python
    pythonVersion: 3.14
    buildCommand: |
      cd backend && \
      pip install -r requirements.txt && \
      python manage.py migrate --noinput && \
      python manage.py collectstatic --no-input --verbosity 2
    startCommand: sh -c 'cd backend && gunicorn skillshare.wsgi --bind 0.0.0.0:10000 --workers 2'
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: skillshare.settings
      - key: DEBUG
        value: "False"
      - key: RENDER
        value: "true"
